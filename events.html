<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Event Manager - Events</title>
  <link rel="stylesheet" href="css/style.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { corePlugins: { preflight: false } }
  </script>
</head>
<body>

  <a href="#main-content" class="skip-link">Skip to main content</a>

  <nav class="navbar" aria-label="Main navigation">
    <div class="container sm:flex-row sm:items-center sm:justify-between sm:gap-4">
      <a href="index.html" class="logo min-h-[44px] inline-flex items-center" aria-label="Go to homepage">
        <span class="logo-icon">CE</span>
        Campus Events
      </a>
      <ul class="nav-links flex-wrap gap-2">
        <li><a href="index.html" class="min-h-[44px] inline-flex items-center" aria-label="Home page">Home</a></li>
        <li><a href="events.html" class="min-h-[44px] inline-flex items-center" aria-label="Browse events">Events</a></li>
        <li><a href="register.html" class="min-h-[44px] inline-flex items-center" aria-label="Register for events">Register</a></li>
        <li><a href="admin.html" class="min-h-[44px] inline-flex items-center" aria-label="Admin dashboard">Admin</a></li>
      </ul>
    </div>
  </nav>

  <main id="main-content">
    <section class="page-hero">
    <div class="page-hero-content">
      <h1 class="text-balance">Upcoming Events</h1>
      <p>Discover exciting workshops, hackathons, seminars and college activities.</p>
    </div>
  </section>

  <section class="filter-bar-section">
    <div class="container">
      <div class="filter-bar gap-3">

        <div class="search-wrapper flex-1 min-w-0">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <label for="searchInput" class="sr-only">Search events</label>
          <input
            type="text"
            id="searchInput"
            class="search-input w-full"
            placeholder="Search events..."
            autocomplete="off"
          />
        </div>

        <label for="categorySelect" class="sr-only">Filter by category</label>
        <select id="categorySelect" class="category-select w-full sm:w-auto">
          <option value="all">All Categories</option>
          <option value="Workshop">Workshop</option>
          <option value="Hackathon">Hackathon</option>
          <option value="Seminar">Seminar</option>
          <option value="Technology">Technology</option>
          <option value="Cultural">Cultural</option>
          <option value="Sports">Sports</option>
          <option value="Startup">Startup</option>
        </select>

        <button id="resetBtn" class="btn btn-secondary btn-sm w-full sm:w-auto">Reset Filters</button>

      </div>
    </div>
  </section>

  <section class="featured-section">
    <div class="container">
      <div class="event-grid events-grid" id="eventsContainer">
      </div>
    </div>
  </section>

  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-content">
        <p class="footer-copyright">&copy; <span id="currentYear"></span> Campus Event Manager. All rights reserved.</p>
        <nav class="footer-nav" aria-label="Footer navigation">
          <a href="index.html">Home</a>
          <a href="events.html">Events</a>
          <a href="register.html">Register</a>
          <a href="admin.html">Admin</a>
        </nav>
      </div>
    </div>
  </footer>

  <button id="backToTop" class="back-to-top" title="Back to top" aria-label="Back to top">&uarr;</button>

  <script src="js/app.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
