<!DOCTYPE html>
<!-- ============================================================
     Campus Event Manager - Events Page
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Campus Event Manager - Events</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <nav class="navbar" aria-label="Main navigation">
    <div class="container">
      <a href="index.html" class="logo">
        <span class="logo-icon">CE</span>
        Campus Events
      </a>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="admin.html">Admin</a></li>
      </ul>
    </div>
  </nav>

  <!-- ===== Page Hero ===== -->
  <section class="page-hero">
    <div class="page-hero-content">
      <h1>Upcoming Events</h1>
      <p>Discover exciting workshops, hackathons, seminars and college activities.</p>
    </div>
  </section>

  <!-- ===== Filter Bar ===== -->
  <section class="filter-bar-section">
    <div class="container">
      <div class="filter-bar">

        <!-- Search input with icon -->
        <div class="search-wrapper">
          <span class="search-icon" aria-hidden="true">🔍</span>
          <label for="searchInput" class="sr-only">Search events</label>
          <input
            type="text"
            id="searchInput"
            class="search-input"
            placeholder="Search events..."
            autocomplete="off"
          />
        </div>

        <!-- Category dropdown -->
        <label for="categorySelect" class="sr-only">Filter by category</label>
        <select id="categorySelect" class="category-select">
          <option value="all">All Categories</option>
          <option value="Workshop">Workshop</option>
          <option value="Hackathon">Hackathon</option>
          <option value="Seminar">Seminar</option>
          <option value="Technology">Technology</option>
          <option value="Cultural">Cultural</option>
          <option value="Sports">Sports</option>
          <option value="Startup">Startup</option>
        </select>

        <!-- Reset button -->
        <button id="resetBtn" class="btn btn-secondary btn-sm">Reset Filters</button>

      </div>
    </div>
  </section>

  <!-- ===== Events Grid ===== -->
  <section class="featured-section">
    <div class="container">
      <div class="event-grid events-grid" id="eventsContainer">
        <!-- Cards rendered by events.js -->
      </div>
    </div>
  </section>

  <!-- ===== Footer ===== -->
  <footer class="footer">
    <div class="container">
      <p>Campus Event Manager &copy; 2026. Developed for Source Code Management Lab</p>
    </div>
  </footer>

  <!-- ===== Back to Top ===== -->
  <button id="backToTop" class="back-to-top" title="Back to top">&uarr;</button>

  <!-- ===== Scripts ===== -->
  <script src="js/app.js"></script>
  <script src="js/events.js"></script>
</body>
</html>
